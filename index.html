<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Supabase Test</title>
</head>
<body>

<h2>Add Data</h2>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<button onclick="addUser()">Save</button>

<h3>Users</h3>
<ul id="list"></ul>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://zroahctdiuxkokfiseas.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpyb2FoY3RkaXV4a29rZmlzZWFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDIwNjEsImV4cCI6MjA4OTU3ODA2MX0.XKgBb9Vncr3bdM92UhuZSE_66G-NPWdFbFUSbAIsE2Q";

const client = createClient(SUPABASE_URL, SUPABASE_KEY);

// ADD USER
window.addUser = async function () {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  const { error } = await client
    .from("users")
    .insert([{ name, phone }]);

  if (error) {
    alert(error.message);
  } else {
    alert("Saved!");
    loadUsers();
  }
};

// LOAD USERS
async function loadUsers() {
  const { data, error } = await client
    .from("users")
    .select("*")
    .order("id", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(user => {
    const li = document.createElement("li");
    li.innerText = user.name + " - " + user.phone;
    list.appendChild(li);
  });
}

loadUsers();
</script>

</body>
</html>
